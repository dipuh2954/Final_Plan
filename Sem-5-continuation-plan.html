<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Plan · W33–W92 · Sem 5 to Placement</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1410; --bg2:#211c16; --surface:#28211a; --card:#2e2620;
  --border:#3d3228; --border2:#4e4035;
  --text:#f0e8d8; --mid:#9a8878; --muted:#5c4e40;
  --commute:#f59e0b; --night:#34d399; --android:#60a5fa; --extra:#c084fc;
  --milestone:#fbbf24;
  --commute-bg:rgba(245,158,11,.07); --night-bg:rgba(52,211,153,.07);
  --android-bg:rgba(96,165,250,.07); --extra-bg:rgba(192,132,252,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sb{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column;}
.sb-head{padding:22px 18px 16px;border-bottom:1px solid var(--border);}
.sb-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--text);line-height:1.2;margin-bottom:4px;}
.sb-sub{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.sb-nav{padding:10px 0;flex:1;}
.sb-slbl{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 18px 4px;}
.sb-btn{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border:none;background:none;
  color:var(--mid);font-family:'Geist',sans-serif;font-size:12px;font-weight:500;text-align:left;width:100%;transition:background .15s,color .15s;}
.sb-btn:hover{background:var(--surface);color:var(--text);}
.sb-btn.active{background:var(--card);color:var(--text);}
.sb-dot{width:7px;height:7px;border-radius:50%;border:2px solid;flex-shrink:0;}
.wk-links{display:none;flex-direction:column;padding:0 0 6px 38px;}
.sb-btn.active+.wk-links{display:flex;}
.wk-lnk{font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted);padding:3px 6px;
  text-decoration:none;transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wk-lnk:hover{color:var(--text);}
.sb-legend{padding:14px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.leg{display:flex;align-items:center;gap:8px;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── MAIN ── */
.main{margin-left:230px;flex:1;min-height:100vh;}
.sp{display:none;} .sp.active{display:block;}

/* SEM HERO */
.sh{padding:40px 44px 32px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.sg{position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;pointer-events:none;opacity:.35;}
.se{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
.st{font-family:'Instrument Serif',serif;font-size:clamp(28px,4vw,46px);line-height:1.05;margin-bottom:10px;}
.sd{font-size:14px;color:var(--mid);line-height:1.7;max-width:580px;font-weight:300;}
.ss{display:flex;gap:28px;margin-top:22px;flex-wrap:wrap;}
.ssn{font-family:'Geist Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.ssl{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:3px;}

/* SLOT KEY */
.sk-row{display:flex;flex-wrap:wrap;gap:8px;padding:16px 44px;border-bottom:1px solid var(--border);background:var(--bg2);}
.sk{display:flex;align-items:center;gap:7px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);padding:5px 12px;border-radius:3px;border:1px solid var(--border);background:var(--surface);}
.skd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* CONTINUITY BANNER */
.cont-banner{margin:20px 44px 0;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.25);
  border-left:3px solid var(--android);padding:14px 18px;font-size:13px;color:#93c5fd;line-height:1.6;}
.cont-banner b{font-weight:600;display:block;margin-bottom:3px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;}

/* WEEKS */
.weeks{padding:24px 44px 60px;display:flex;flex-direction:column;gap:14px;}

/* WEEK CARD */
.wc{background:var(--card);border:1px solid var(--border);border-radius:5px;overflow:hidden;transition:border-color .2s;}
.wc:hover{border-color:var(--border2);}
.wc.ms{border-color:rgba(251,191,36,.3);}
.wch{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none;
  border-bottom:1px solid transparent;transition:border-color .2s;}
.wc.open .wch{border-bottom-color:var(--border);}
.wnum{font-family:'Geist Mono',monospace;font-size:10px;font-weight:700;padding:4px 8px;border-radius:3px;flex-shrink:0;letter-spacing:1px;}
.wtitle{flex:1;font-size:13px;font-weight:600;line-height:1.3;}
.msbadge{font-family:'Geist Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px;flex-shrink:0;
  background:rgba(251,191,36,.1);color:var(--milestone);border:1px solid rgba(251,191,36,.3);letter-spacing:1px;}
.warr{font-family:'Geist Mono',monospace;font-size:13px;color:var(--muted);transition:transform .25s;flex-shrink:0;}
.wc.open .warr{transform:rotate(180deg);}

/* WEEK BODY */
.wcb{display:none;padding:16px 18px;grid-template-columns:1fr 1fr;gap:10px;}
.wc.open .wcb{display:grid;}

/* SLOT */
.slot{border-radius:4px;border:1px solid;padding:13px 15px;display:flex;flex-direction:column;gap:8px;}
.slot.full{grid-column:1/-1;}
.slbl{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  font-weight:700;display:flex;align-items:center;gap:6px;}
.slbl::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.stime{font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:-4px;}
.stasks{list-style:none;display:flex;flex-direction:column;gap:5px;}
.stasks li{font-size:12px;color:var(--mid);padding-left:14px;position:relative;line-height:1.5;}
.stasks li::before{content:'→';position:absolute;left:0;font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);}
.stasks li b{color:var(--text);font-weight:600;}

.sl-c{background:var(--commute-bg);border-color:rgba(245,158,11,.2);}
.sl-c .slbl{color:var(--commute);} .sl-c .slbl::before{background:var(--commute);}
.sl-n{background:var(--night-bg);border-color:rgba(52,211,153,.2);}
.sl-n .slbl{color:var(--night);} .sl-n .slbl::before{background:var(--night);}
.sl-a{background:var(--android-bg);border-color:rgba(96,165,250,.2);}
.sl-a .slbl{color:var(--android);} .sl-a .slbl::before{background:var(--android);}
.sl-e{background:var(--extra-bg);border-color:rgba(192,132,252,.2);}
.sl-e .slbl{color:var(--extra);} .sl-e .slbl::before{background:var(--extra);}
.sl-m{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.3);grid-column:1/-1;}
.sl-m .slbl{color:var(--milestone);} .sl-m .slbl::before{background:var(--milestone);}

/* SECTION DIVIDER */
.sdiv{display:flex;align-items:center;gap:14px;padding:4px 0;}
.sdiv-txt{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.sdiv-line{flex:1;height:1px;background:var(--border);}

@media(max-width:768px){
  .sb{display:none;} .main{margin-left:0;}
  .wcb{grid-template-columns:1fr;}
  .weeks{padding:20px 16px 40px;} .sh{padding:24px 16px 20px;}
  .sk-row,.cont-banner{margin-left:16px;margin-right:16px;}
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<div class="sb">
  <div class="sb-head">
    <div class="sb-title">W33 → W92<br><em>Continuation</em></div>
    <div class="sb-sub">Sem 5 · 6 · 7 · 8</div>
  </div>
  <div class="sb-nav">
    <div class="sb-slbl">Semesters</div>
    <div>
      <button class="sb-btn active" onclick="show('s5',this)">
        <span class="sb-dot" style="border-color:#60a5fa"></span>Sem 5 · Build (W33–48)
      </button>
      <div class="wk-links" id="wl-s5"></div>
    </div>
    <div>
      <button class="sb-btn" onclick="show('s6',this)">
        <span class="sb-dot" style="border-color:#fb923c"></span>Sem 6 · Polish (W49–64)

      <div class="wk-links" id="wl-s6"></div>

    <div>
      <button class="sb-btn" onclick="show('s7',this)">

      <div class="wk-links" id="wl-s7"></div>
    </div>
    <div>
      <button class="sb-btn" onclick="show('s8',this)">
        <span class="sb-dot" style="border-color:#f87171"></span>Sem 8 · Placement (W81–92)
      </button>
      <div class="wk-links" id="wl-s8"></div>
    </div>
  </div>
  <div class="sb-legend">
    <div style="font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Slots</div>
    <div class="leg"><span class="ldot" style="background:var(--commute)"></span>Commute 6 AM · DSA</div>
    <div class="leg"><span class="ldot" style="background:var(--night)"></span>Night Block 10 PM</div>
    <div class="leg"><span class="ldot" style="background:var(--android)"></span>Android 3:30 PM (Weekend)</div>
    <div class="leg"><span class="ldot" style="background:var(--extra)"></span>Weekend Study Block</div>
    <div class="leg"><span class="ldot" style="background:var(--milestone)"></span>Milestone</div>
  </div>
</div>

<div class="main" id="mc"></div>

        <div class="sk"><span class="skd" style="background:var(--night)"></span>Night Block 10 PM · MacBook · 1 hr</div>
        <div class="sk"><span class="skd" style="background:var(--android)"></span>Android Block 3:30 PM (Weekend)</div>
        <div class="sk"><span class="skd" style="background:var(--extra)"></span>Weekend Study Block</div>
      </div>
      <div class="cont-banner"><b>Continuing from W${si===0?'32':'previous semester'}</b>${sem.banner}</div>
    `;

    const wlC=document.getElementById(`wl-${sem.id}`);
    const wks=document.createElement('div');
    wks.className='weeks';

    sem.weeks.forEach((wk,wi)=>{
      const wl=document.createElement('a');
      wl.className='wk-lnk';
      wl.href=`#wc-${sem.id}-${wi}`;
      wl.textContent=`${wk.n} · ${wk.t.slice(0,22)}${wk.t.length>22?'…':''}`;
      if(wlC) wlC.appendChild(wl);

      const card=document.createElement('div');
      card.className=`wc${wk.ms?' ms':''}`;
      card.id=`wc-${sem.id}-${wi}`;
      card.innerHTML=`
        <div class="wch" onclick="tw(this)">
          <span class="wnum" style="background:${sem.color}18;color:${sem.color}">${wk.n}</span>
          <span class="wtitle">${wk.t}</span>
          ${wk.ms?'<span class="msbadge">★ Milestone</span>':''}
          <span class="warr">▾</span>
        </div>
        <div class="wcb">
          ${sl('sl-c','📱 Commute · 6 AM','Tue–Sat · 2 LeetCode + reading',wk.c)}
          ${sl('sl-n','💻 Night Block · 10 PM','MacBook · 1 hr · Tue–Sat',wk.ni)}
          ${sl('sl-a full','🖥️ Android Block · 3:30 PM','MacBook · 2 hrs · Sun & Mon',wk.a)}
          ${wk.e?sl('sl-e full','🟣 Weekend Study Block','After exams — open block',[wk.e]):''}
          ${wk.ms?`<div class="slot sl-m"><div class="slbl">★ Milestone</div><ul class="stasks"><li><b>${wk.mt}</b></li></ul></div>`:''}
        </div>
      `;
      wks.appendChild(card);
    });
    panel.appendChild(wks);
    mc.appendChild(panel);
  });
}

function sl(cls,lbl,time,tasks){
  if(!tasks||!tasks.length) return '';
  return `<div class="slot ${cls}"><div class="slbl">${lbl}</div><div class="stime">${time}</div><ul class="stasks">${tasks.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
}
function tw(h){h.parentElement.classList.toggle('open');}
function show(id,btn){
  document.querySelectorAll('.sp').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
}
build();
</script>
</body>
</html>
