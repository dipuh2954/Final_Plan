<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Personalised Weekly Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1a1410;
  --bg2:     #211c16;
  --surface: #28211a;
  --card:    #2e2620;
  --border:  #3d3228;
  --border2: #4e4035;

  --text:    #f0e8d8;
  --mid:     #9a8878;
  --muted:   #5c4e40;

  /* Slot colours */
  --commute: #f59e0b;   /* amber  — morning commute DSA   */
  --night:   #34d399;   /* emerald — night study block    */
  --android: #60a5fa;   /* blue   — android block         */
  --extra:   #c084fc;   /* purple — extra weekend blocks  */
  --exam:    #f87171;   /* red    — exam-period note      */
  --milestone:#fbbf24;  /* gold   — milestone             */

  --commute-bg: rgba(245,158,11,0.07);
  --night-bg:   rgba(52,211,153,0.07);
  --android-bg: rgba(96,165,250,0.07);
  --extra-bg:   rgba(192,132,252,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Geist',sans-serif;
  min-height:100vh;
  display:flex;
}

/* ── SIDEBAR ─────────────────────────────── */
.sb{
  width:230px;min-width:230px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;
  overflow-y:auto;z-index:100;
  display:flex;flex-direction:column;
}
.sb-head{
  padding:22px 18px 16px;
  border-bottom:1px solid var(--border);
}
.sb-title{
  font-family:'Instrument Serif',serif;
  font-size:18px;
  color:var(--text);
  line-height:1.2;
  margin-bottom:4px;
}
.sb-sub{
  font-family:'Geist Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
}
.sb-nav{padding:10px 0;flex:1;}
.sb-section-lbl{
  font-family:'Geist Mono',monospace;
  font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  padding:10px 18px 4px;
}
.sb-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 18px;cursor:pointer;
  border:none;background:none;
  color:var(--mid);font-family:'Geist',sans-serif;
  font-size:12px;font-weight:500;
  text-align:left;width:100%;
  transition:background .15s,color .15s;
}
.sb-btn:hover{background:var(--surface);color:var(--text);}
.sb-btn.active{background:var(--card);color:var(--text);}
.sb-dot{width:7px;height:7px;border-radius:50%;border:2px solid;flex-shrink:0;}

.week-links{display:none;flex-direction:column;padding:0 0 6px 38px;}
.sb-btn.active+.week-links{display:flex;}
.wk-lnk{
  font-family:'Geist Mono',monospace;font-size:9px;
  color:var(--muted);padding:3px 6px;
  text-decoration:none;transition:color .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.wk-lnk:hover{color:var(--text);}

/* legend */
.sb-legend{
  padding:14px 18px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;
}
.leg-row{
  display:flex;align-items:center;gap:8px;
  font-family:'Geist Mono',monospace;font-size:9px;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);
}
.leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── MAIN ─────────────────────────────────── */
.main{margin-left:230px;flex:1;min-height:100vh;}
.sem-panel{display:none;}
.sem-panel.active{display:block;}

/* SEM HERO */
.sem-hero{
  padding:40px 44px 32px;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.sem-glow{
  position:absolute;top:-60px;right:-60px;
  width:260px;height:260px;border-radius:50%;
  pointer-events:none;opacity:.35;
}
.sem-eye{
  font-family:'Geist Mono',monospace;
  font-size:10px;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:10px;
}
.sem-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(28px,4vw,46px);
  line-height:1.05;margin-bottom:10px;
}
.sem-desc{font-size:14px;color:var(--mid);line-height:1.7;max-width:580px;font-weight:300;}
.sem-stats{display:flex;gap:28px;margin-top:22px;flex-wrap:wrap;}
.ss-num{font-family:'Geist Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.ss-lbl{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:3px;}

/* SLOT KEY */
.slot-key{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:16px 44px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.sk{
  display:flex;align-items:center;gap:7px;
  font-family:'Geist Mono',monospace;
  font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);
  padding:5px 12px;
  border-radius:3px;border:1px solid var(--border);
  background:var(--surface);
}
.sk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* EXAM ALERT */
.exam-alert{
  margin:20px 44px 0;
  background:rgba(248,113,113,0.07);
  border:1px solid rgba(248,113,113,0.25);
  border-left:3px solid var(--exam);
  padding:14px 18px;
  display:flex;gap:12px;align-items:flex-start;
  font-size:13px;color:#fca5a5;line-height:1.6;
}
.exam-alert b{font-weight:600;display:block;margin-bottom:3px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;}

/* WEEKS */
.weeks{padding:24px 44px 60px;display:flex;flex-direction:column;gap:14px;}

/* WEEK CARD */
.wc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:5px;overflow:hidden;
  transition:border-color .2s;
}
.wc:hover{border-color:var(--border2);}
.wc.milestone{border-color:rgba(251,191,36,.3);}

.wc-head{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;cursor:pointer;
  user-select:none;
  border-bottom:1px solid transparent;
  transition:border-color .2s;
}
.wc.open .wc-head{border-bottom-color:var(--border);}

.wc-num{
  font-family:'Geist Mono',monospace;font-size:10px;
  font-weight:700;padding:4px 8px;border-radius:3px;
  flex-shrink:0;letter-spacing:1px;
}
.wc-title{flex:1;font-size:13px;font-weight:600;line-height:1.3;}
.ms-badge{
  font-family:'Geist Mono',monospace;font-size:9px;
  padding:3px 8px;border-radius:2px;flex-shrink:0;
  background:rgba(251,191,36,.1);color:var(--milestone);
  border:1px solid rgba(251,191,36,.3);letter-spacing:1px;
}
.wc-arrow{
  font-family:'Geist Mono',monospace;font-size:13px;
  color:var(--muted);transition:transform .25s;flex-shrink:0;
}
.wc.open .wc-arrow{transform:rotate(180deg);}

/* WEEK BODY — slot grid */
.wc-body{
  display:none;
  padding:16px 18px;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.wc.open .wc-body{display:grid;}

/* SLOT BLOCK */
.slot{
  border-radius:4px;border:1px solid;
  padding:13px 15px;
  display:flex;flex-direction:column;gap:8px;
}
.slot.full{grid-column:1/-1;}
.slot-lbl{
  font-family:'Geist Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  font-weight:700;display:flex;align-items:center;gap:6px;
}
.slot-lbl::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.slot-time{
  font-family:'Geist Mono',monospace;font-size:9px;
  color:var(--muted);letter-spacing:1px;
  margin-top:-4px;
}
.slot-tasks{list-style:none;display:flex;flex-direction:column;gap:5px;}
.slot-tasks li{
  font-size:12px;color:var(--mid);
  padding-left:14px;position:relative;line-height:1.5;
}
.slot-tasks li::before{
  content:'→';position:absolute;left:0;
  font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);
}
.slot-tasks li b{color:var(--text);font-weight:600;}

/* Slot theme: commute */
.sl-commute{background:var(--commute-bg);border-color:rgba(245,158,11,.2);}
.sl-commute .slot-lbl{color:var(--commute);}
.sl-commute .slot-lbl::before{background:var(--commute);}

/* Slot theme: night */
.sl-night{background:var(--night-bg);border-color:rgba(52,211,153,.2);}
.sl-night .slot-lbl{color:var(--night);}
.sl-night .slot-lbl::before{background:var(--night);}

/* Slot theme: android */
.sl-android{background:var(--android-bg);border-color:rgba(96,165,250,.2);}
.sl-android .slot-lbl{color:var(--android);}
.sl-android .slot-lbl::before{background:var(--android);}

/* Slot theme: extra */
.sl-extra{background:var(--extra-bg);border-color:rgba(192,132,252,.2);}
.sl-extra .slot-lbl{color:var(--extra);}
.sl-extra .slot-lbl::before{background:var(--extra);}

/* Slot theme: milestone */
.sl-milestone{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.3);grid-column:1/-1;}
.sl-milestone .slot-lbl{color:var(--milestone);}
.sl-milestone .slot-lbl::before{background:var(--milestone);}

/* SECTION BREAK */
.sec-break{
  display:flex;align-items:center;gap:14px;padding:4px 0;
}
.sec-break-txt{
  font-family:'Geist Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;
}
.sec-break-line{flex:1;height:1px;background:var(--border);}

@media(max-width:768px){
  .sb{display:none;}
  .main{margin-left:0;}
  .wc-body{grid-template-columns:1fr;}
  .weeks{padding:20px 16px 40px;}
  .sem-hero{padding:24px 16px 20px;}
  .slot-key,.exam-alert{margin-left:16px;margin-right:16px;}
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

// ───────────── RENDER ─────────────
function build(){
  const main = document.getElementById('mainContent');
  main.innerHTML='';

  DATA.forEach((sem,si)=>{
    const panel = document.createElement('div');
    panel.className='sem-panel'+(si===0?' active':'');
    panel.id=sem.id;

    // Glow colour
    const glowHex = sem.color;

    panel.innerHTML=`
      <div class="sem-hero">
        <div class="sem-glow" style="background:radial-gradient(circle,${glowHex}40 0%,transparent 70%)"></div>
        <div class="sem-eye" style="color:${sem.color}">${sem.eye}</div>
        <div class="sem-title">${sem.title}</div>
        <div class="sem-desc">${sem.desc}</div>
        <div class="sem-stats">${sem.stats.map(s=>`<div><div class="ss-num" style="color:${sem.color}">${s.n}</div><div class="ss-lbl">${s.l}</div></div>`).join('')}</div>
      </div>
      <div class="slot-key">
        <div class="sk"><span class="sk-dot" style="background:var(--commute)"></span>Commute 6 AM · DSA on phone</div>
        <div class="sk"><span class="sk-dot" style="background:var(--night)"></span>Night Block 10 PM · MacBook · 1 hr</div>
        <div class="sk"><span class="sk-dot" style="background:var(--android)"></span>Android Block 3:30 PM · MacBook · 2 hrs</div>
        <div class="sk"><span class="sk-dot" style="background:var(--extra)"></span>Weekend Extra · after exams open up</div>
      </div>
      ${sem.examAlert?`<div class="exam-alert"><div><b>Exam Period Active</b>${sem.examAlert}</div></div>`:''}
    `;

    const wlContainer = document.getElementById(`wl-${sem.id}`);
    const weeksDiv = document.createElement('div');
    weeksDiv.className='weeks';

    sem.weeks.forEach((wk,wi)=>{
      // Sidebar link
      const wLink = document.createElement('a');
      wLink.className='wk-lnk';
      wLink.href=`#wkc-${sem.id}-${wi}`;
      wLink.textContent=`${wk.num} · ${wk.title.slice(0,22)}${wk.title.length>22?'…':''}`;
      if(wlContainer) wlContainer.appendChild(wLink);

      const card = document.createElement('div');
      card.className=`wc${wk.milestone?' milestone':''}`;
      card.id=`wkc-${sem.id}-${wi}`;

      card.innerHTML=`
        <div class="wc-head" onclick="tw(this)">
          <span class="wc-num" style="background:${sem.color}18;color:${sem.color}">${wk.num}</span>
          <span class="wc-title">${wk.title}</span>
          ${wk.milestone?'<span class="ms-badge">★ Milestone</span>':''}
          <span class="wc-arrow">▾</span>
        </div>
        <div class="wc-body">
          ${mkSlot('sl-commute','📱 Commute · 6 AM (Weekdays)','Tue–Sat bus · LeetCode mobile + reading',wk.commute)}
          ${mkSlot('sl-night','💻 Night Block · 10 PM (Weekdays)','MacBook · 1 hour · Tue–Sat',wk.night)}
          ${mkSlot('sl-android','🖥️ Android Block · 3:30 PM (Weekend)','MacBook · 2 hours · Sun & Mon',wk.android)}
          ${wk.extra?mkSlot('sl-extra full','🟣 Weekend Extra Block','Post-exam · Study Blocks open',[wk.extra]):''}
          ${wk.milestone?`<div class="slot sl-milestone full"><div class="slot-lbl">★ Milestone Check</div><ul class="slot-tasks"><li><b>${wk.milestoneText}</b></li></ul></div>`:''}
        </div>
      `;
      weeksDiv.appendChild(card);
    });

    panel.appendChild(weeksDiv);
    main.appendChild(panel);
  });
}

function mkSlot(cls,lbl,time,tasks){
  if(!tasks||tasks.length===0) return '';
  const items = tasks.map(t=>`<li>${t}</li>`).join('');
  return `<div class="slot ${cls}">
    <div class="slot-lbl">${lbl}</div>
    <div class="slot-time">${time}</div>
    <ul class="slot-tasks">${items}</ul>
  </div>`;
}

function tw(head){
  head.parentElement.classList.toggle('open');
}

function showSem(id,btn){
  document.querySelectorAll('.sem-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
}

build();
</script>
