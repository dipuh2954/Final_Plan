<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week-by-Week Android Developer Plan</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c14;
  --surface: #121220;
  --card: #171726;
  --border: #222238;
  --border2: #2a2a48;
  --text: #e4e4f4;
  --muted: #5a5a80;
  --mid: #8888aa;

  --android: #3ddc84;
  --android-bg: rgba(61,220,132,0.08);
  --android-border: rgba(61,220,132,0.2);

  --dsa: #60a5fa;
  --dsa-bg: rgba(96,165,250,0.08);
  --dsa-border: rgba(96,165,250,0.2);

  --career: #fb923c;
  --career-bg: rgba(251,146,60,0.08);
  --career-border: rgba(251,146,60,0.2);

  --weekend: #c084fc;
  --weekend-bg: rgba(192,132,252,0.08);
  --weekend-border: rgba(192,132,252,0.2);

  --milestone: #fbbf24;
  --milestone-bg: rgba(251,191,36,0.08);
  --milestone-border: rgba(251,191,36,0.3);

  /* Semester colors */
  --s34: #3ddc84;
  --s5: #60a5fa;
  --s6: #fb923c;
  --s7: #c084fc;
  --s8: #f87171;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo .logo-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--android);
  line-height: 1.3;
}

.sidebar-logo .logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
}

.sidebar-nav { padding: 12px 0; flex: 1; }

.nav-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 18px 4px;
}

.nav-sem {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-bottom: 8px;
}

.nav-sem-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.15s;
  border: none;
  background: none;
  color: var(--mid);
  text-align: left;
  width: 100%;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  font-weight: 500;
}

.nav-sem-btn:hover { background: var(--card); color: var(--text); }
.nav-sem-btn.active { background: var(--card); color: var(--text); }

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid;
}

.nav-sem-btn.active .nav-dot { border-color: transparent; }

.week-links {
  display: none;
  flex-direction: column;
  padding: 0 0 4px 36px;
}

.nav-sem-btn.active + .week-links { display: flex; }

.week-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  padding: 4px 8px;
  text-decoration: none;
  border-radius: 2px;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.week-link:hover { color: var(--text); }

/* LEGEND */
.legend {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

.legend-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* MAIN CONTENT */
.main {
  margin-left: 220px;
  flex: 1;
  min-height: 100vh;
}

/* SEMESTER PANELS */
.sem-panel { display: none; }
.sem-panel.active { display: block; }

/* SEM HERO */
.sem-hero {
  padding: 40px 40px 32px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.sem-hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  border-radius: 50%;
  pointer-events: none;
}

.sem-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.sem-title {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(22px, 3vw, 34px);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 12px;
}

.sem-desc {
  font-size: 14px;
  color: var(--mid);
  max-width: 600px;
  line-height: 1.7;
  font-weight: 300;
}

.sem-stats {
  display: flex;
  gap: 32px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.sem-stat { }
.sem-stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.sem-stat-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
}

/* WEEKS CONTAINER */
.weeks-container {
  padding: 32px 40px 60px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* WEEK CARD */
.week-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.week-card:hover { border-color: var(--border2); }

.week-card.milestone-week {
  border-color: var(--milestone-border);
  background: linear-gradient(135deg, var(--card) 0%, rgba(251,191,36,0.03) 100%);
}

.week-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
}

.week-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 3px;
  flex-shrink: 0;
  letter-spacing: 1px;
}

.week-title {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
}

.week-tags {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.week-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 2px;
  border: 1px solid;
}

.milestone-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  background: var(--milestone-bg);
  color: var(--milestone);
  border: 1px solid var(--milestone-border);
  padding: 3px 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

.week-toggle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
}

.week-card.open .week-toggle { transform: rotate(180deg); }

/* WEEK BODY */
.week-body {
  display: none;
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.week-card:not(.open) .week-body { display: none; }
.week-card.open .week-body { display: grid; }

.task-block {
  border-radius: 4px;
  border: 1px solid;
  padding: 14px 16px;
}

.task-block.full-width { grid-column: 1 / -1; }

.task-block-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.task-block-label::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.task-list li {
  font-size: 12px;
  color: var(--mid);
  padding-left: 16px;
  position: relative;
  line-height: 1.5;
  font-weight: 400;
}

.task-list li::before {
  content: '→';
  position: absolute;
  left: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.task-list li strong {
  color: var(--text);
  font-weight: 600;
}

/* Android block */
.tb-android { background: var(--android-bg); border-color: var(--android-border); }
.tb-android .task-block-label { color: var(--android); }
.tb-android .task-block-label::before { background: var(--android); }

/* DSA block */
.tb-dsa { background: var(--dsa-bg); border-color: var(--dsa-border); }
.tb-dsa .task-block-label { color: var(--dsa); }
.tb-dsa .task-block-label::before { background: var(--dsa); }

/* Career block */
.tb-career { background: var(--career-bg); border-color: var(--career-border); }
.tb-career .task-block-label { color: var(--career); }
.tb-career .task-block-label::before { background: var(--career); }

/* Weekend block */
.tb-weekend { background: var(--weekend-bg); border-color: var(--weekend-border); }
.tb-weekend .task-block-label { color: var(--weekend); }
.tb-weekend .task-block-label::before { background: var(--weekend); }

/* Milestone block */
.tb-milestone { background: var(--milestone-bg); border-color: var(--milestone-border); grid-column: 1 / -1; }
.tb-milestone .task-block-label { color: var(--milestone); }
.tb-milestone .task-block-label::before { background: var(--milestone); }

/* SECTION DIVIDERS */
.section-break {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 0;
}

.section-break-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
}

.section-break-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* DAILY RHYTHM BOX */
.daily-rhythm {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px;
  margin: 32px 40px 0;
}

.dr-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.dr-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}

.dr-slot {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
}

.dr-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 4px;
}

.dr-activity { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.dr-detail { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .week-body { grid-template-columns: 1fr; }
  .weeks-container { padding: 20px 16px 40px; }
  .sem-hero { padding: 24px 16px 20px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-title">ANDROID DEV<br>WEEKLY PLAN</div>
    <div class="logo-sub">BPPIMT → HIGH SALARY</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section-label">Semesters</div>

    <div class="nav-sem">
      <button class="nav-sem-btn active" onclick="showSem('s34', this)" style="--c:var(--s34)">
        <span class="nav-dot" style="border-color:var(--s34)"></span>
        Sem 3–4 · Foundation
      </button>
      <div class="week-links" id="wl-s34"></div>
    </div>

    <div class="nav-sem">
      <button class="nav-sem-btn" onclick="showSem('s5', this)" style="--c:var(--s5)">
        <span class="nav-dot" style="border-color:var(--s5)"></span>
        Sem 5 · Build
      </button>
      <div class="week-links" id="wl-s5"></div>
    </div>

    <div class="nav-sem">
      <button class="nav-sem-btn" onclick="showSem('s6', this)" style="--c:var(--s6)">
        <span class="nav-dot" style="border-color:var(--s6)"></span>
        Sem 6 · Internship
      </button>
      <div class="week-links" id="wl-s6"></div>
    </div>

    <div class="nav-sem">
      <button class="nav-sem-btn" onclick="showSem('s7', this)" style="--c:var(--s7)">
        <span class="nav-dot" style="border-color:var(--s7)"></span>
        Sem 7 · Interview Ready
      </button>
      <div class="week-links" id="wl-s7"></div>
    </div>

    <div class="nav-sem">
      <button class="nav-sem-btn" onclick="showSem('s8', this)" style="--c:var(--s8)">
        <span class="nav-dot" style="border-color:var(--s8)"></span>
        Sem 8 · Placement
      </button>
      <div class="week-links" id="wl-s8"></div>
    </div>
  </div>

  <div class="legend">
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Legend</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--android)"></span>Android / Technical</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--dsa)"></span>DSA / Algorithms</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--career)"></span>Career / Profile</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--weekend)"></span>Weekend Project</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--milestone)"></span>Milestone</div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent"></div>

// ─────────────────────────────────────────────

        career: ['Accept your chosen offer: written confirmation + signed letter.', 'Decline other offers graciously: "Thank you for the offer. After careful consideration, I\'ve decided to go with another opportunity. I have tremendous respect for your team and hope our paths cross in the future."', 'Never ghost. The Android community in India is small.'],
        weekend: ['Update LinkedIn: "Excited to announce I\'m joining [Company] as an Android Developer in [Month]!" Tag the company.']
      },
      {
        num: 'W92', title: 'Before Day 1: Prepare',
        android: ['Learn: read the company\'s engineering blog. Find out their Android tech stack. Study anything unfamiliar.', 'Set up: clean dev environment, fresh Android Studio, review git workflow.'],
        dsa: ['This habit will serve you in future interviews. Don\'t stop.'],
        career: ['Connect on LinkedIn with your future team members before day 1.', 'Prepare: "What do I want to learn in my first 90 days?" Write it down. Share with manager on day 1. Shows ownership mindset.'],
        weekend: ['Rest. You earned it.'],
        milestone: true,
        milestoneText: 'YOU DID IT. From zero to Android Developer at a product company — in the timeline you planned. This is just the beginning. The skills you built here will compound for your entire career. Now the real game begins.'
      }
    ]
  }
];

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderAll() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  semesters.forEach((sem, si) => {
    const panel = document.createElement('div');
    panel.className = 'sem-panel' + (si === 0 ? ' active' : '');
    panel.id = sem.id;

    // Hero
    panel.innerHTML = `
      <div class="sem-hero" style="--sem-color:${sem.color}">
        <div style="position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,${sem.color}10 0%,transparent 70%);pointer-events:none"></div>
        <div class="sem-eyebrow" style="color:${sem.color}">${sem.eyebrow}</div>
        <div class="sem-title">${sem.title}</div>
        <div class="sem-desc">${sem.desc}</div>
        <div class="sem-stats">
          ${sem.stats.map(s => `<div class="sem-stat"><div class="sem-stat-num" style="color:${sem.color}">${s.num}</div><div class="sem-stat-label">${s.label}</div></div>`).join('')}
        </div>
      </div>
    `;

    // Daily rhythm (only show on first sem)
    if (si === 0) {
      panel.innerHTML += `
        <div class="daily-rhythm">
          <div class="dr-title">Your Daily Rhythm — Every Single Day</div>
          <div class="dr-grid">
            <div class="dr-slot"><div class="dr-time">6:00–7:30 AM</div><div class="dr-activity" style="color:var(--dsa)">DSA Practice</div><div class="dr-detail">2 LeetCode problems. Fresh brain = best problem-solving.</div></div>
            <div class="dr-slot"><div class="dr-time">9:00 AM–12:00</div><div class="dr-activity" style="color:var(--mid)">College Classes</div><div class="dr-detail">Attend. Maintain CGPA. Don't skip exams.</div></div>
            <div class="dr-slot"><div class="dr-time">2:00–5:00 PM</div><div class="dr-activity" style="color:var(--android)">Android Learning</div><div class="dr-detail">Study concept + build exercise. 3 hours deep work.</div></div>
            <div class="dr-slot"><div class="dr-time">5:00–6:00 PM</div><div class="dr-activity" style="color:var(--career)">Career Work</div><div class="dr-detail">Apply, post on LinkedIn, network, read articles.</div></div>
            <div class="dr-slot"><div class="dr-time">8:00–9:30 PM</div><div class="dr-activity" style="color:var(--android)">Android Continued</div><div class="dr-detail">Review the day. Push code to GitHub. Write TIL note.</div></div>
            <div class="dr-slot"><div class="dr-time">Saturday</div><div class="dr-activity" style="color:var(--weekend)">Weekend Project</div><div class="dr-detail">Build the weekend project from this week's card.</div></div>
            <div class="dr-slot"><div class="dr-time">Sunday</div><div class="dr-activity" style="color:var(--mid)">Contest + Rest</div><div class="dr-detail">LeetCode/CodeChef contest. Then actual rest.</div></div>
          </div>
        </div>
      `;
    }

    // Weeks
    const weeksDiv = document.createElement('div');
    weeksDiv.className = 'weeks-container';

    const wlContainer = document.getElementById(`wl-${sem.id}`);

    sem.weeks.forEach((week, wi) => {
      // Week link in sidebar
      const wLink = document.createElement('a');
      wLink.className = 'week-link';
      wLink.href = `#week-${sem.id}-${wi}`;
      wLink.textContent = `${week.num} · ${week.title.slice(0,22)}${week.title.length > 22 ? '…' : ''}`;
      if (wlContainer) wlContainer.appendChild(wLink);

      // Build card
      const card = document.createElement('div');
      card.className = `week-card${week.milestone ? ' milestone-week' : ''}`;
      card.id = `week-${sem.id}-${wi}`;

      const tagsHtml = [
        `<span class="week-tag" style="color:var(--android);border-color:var(--android-border);background:var(--android-bg)">Android</span>`,
        `<span class="week-tag" style="color:var(--dsa);border-color:var(--dsa-border);background:var(--dsa-bg)">DSA</span>`
      ].join('');

      card.innerHTML = `
        <div class="week-header" onclick="toggleWeek(this)">
          <span class="week-num" style="background:${sem.color}15;color:${sem.color}">${week.num}</span>
          <span class="week-title">${week.title}</span>
          <div class="week-tags">${tagsHtml}</div>
          ${week.milestone ? '<span class="milestone-badge">★ MILESTONE</span>' : ''}
          <span class="week-toggle">▾</span>
        </div>
        <div class="week-body">
          <div class="task-block tb-android">
            <div class="task-block-label">Android / Technical</div>
            <ul class="task-list">${week.android.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
          <div class="task-block tb-dsa">
            <div class="task-block-label">DSA / Algorithms</div>
            <ul class="task-list">${week.dsa.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
          <div class="task-block tb-career">
            <div class="task-block-label">Career / Profile</div>
            <ul class="task-list">${week.career.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
          <div class="task-block tb-weekend">
            <div class="task-block-label">Weekend Project</div>
            <ul class="task-list">${week.weekend.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
          ${week.milestone ? `<div class="task-block tb-milestone"><div class="task-block-label">★ Milestone</div><ul class="task-list"><li><strong>${week.milestoneText}</strong></li></ul></div>` : ''}
        </div>
      `;

      weeksDiv.appendChild(card);
    });

    panel.appendChild(weeksDiv);
    main.appendChild(panel);
  });
}

function toggleWeek(header) {
  const card = header.parentElement;
  card.classList.toggle('open');
}

function showSem(id, btn) {
  document.querySelectorAll('.sem-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-sem-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;
  window.scrollTo(0, 0);
}

renderAll();
</script>
</body>
</html>
